
    <svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
      <defs>
        <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#eff6ff" />
          <stop offset="48%" stop-color="#f8fafc" />
          <stop offset="100%" stop-color="#ecfeff" />
        </linearGradient>
        <linearGradient id="buttonPrimary" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0f766e" />
          <stop offset="100%" stop-color="#0ea5e9" />
        </linearGradient>
        <linearGradient id="analysisBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(240,249,255,0.95)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0.98)" />
        </linearGradient>
        <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
          <stop offset="100%" stop-color="rgba(14,165,233,0.12)" />
        </linearGradient>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="rgba(15,23,42,0.18)" />
        </filter>
      </defs>
      
      
    <rect width="1280" height="800" fill="url(#pageBg)" />
    <circle cx="1160" cy="128" r="160" fill="rgba(14,165,233,0.12)" />
    <circle cx="179" cy="720" r="210" fill="rgba(15,118,110,0.14)" />
    <circle cx="742" cy="760" r="110" fill="rgba(245,158,11,0.14)" />
    <path d="M 921.5999999999999 64 C 1100.8 128, 1203.1999999999998 224.00000000000003, 1254.4 432" fill="none" stroke="rgba(15,23,42,0.08)" stroke-width="2" stroke-dasharray="10 14" />
  
      <rect x="48" y="52" width="1184" height="696" rx="34" fill="rgba(255,255,255,0.68)" stroke="rgba(255,255,255,0.72)" />
      
    <text x="100" y="132" fill="#0a66c2" font-size="14" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">LinkedIn Analyzer</text>
    <text x="100" y="176" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Veja score, benchmark e</text>
<text x="100" y="230" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">foco principal sem sair</text>
<text x="100" y="284" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">da pagina.</text>
    <text x="100" y="356" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">A interface resume o posicionamento do</text>
<text x="100" y="386" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">perfil e destaca o que merece ajuste</text>
<text x="100" y="416" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">imediato para melhorar clareza e impacto.</text>
    
  
      
    <g>
      <rect x="730" y="100" width="430" height="590" rx="28" fill="rgba(255,255,255,0.94)" stroke="rgba(15, 23, 42, 0.10)" />
      <rect x="731" y="101" width="428" height="588" rx="27" fill="url(#cardGlow)" opacity="0.65" />
      <text x="756" y="136" fill="#f59e0b" font-size="12" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">LINKEDIN ANALYZER</text>
      <text x="756" y="174" fill="#0f172a" font-size="28" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Diagnostico de perfil com score de</text>
<text x="756" y="208" fill="#0f172a" font-size="28" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">mercado</text>
      <text x="756" y="256" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Capture o perfil aberto no LinkedIn,</text>
<text x="756" y="277" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">gere sugestoes com IA e exporte um PDF</text>
<text x="756" y="298" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">do resultado.</text>
      <rect x="756" y="337" width="183" height="48" rx="14" fill="url(#buttonPrimary)" />
      <text x="847" y="367" fill="#ffffff" font-size="15" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Analisar perfil</text>
      <rect x="951" y="337" width="183" height="48" rx="14" fill="#f8fafc" stroke="rgba(15, 23, 42, 0.10)" />
      <text x="1042" y="367" fill="#0f172a" font-size="15" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Exportar PDF</text>
    </g>
  
    <g>
      <rect x="756" y="419" width="378" height="247" rx="22" fill="url(#analysisBg)" stroke="rgba(14,165,233,0.12)" />
      <text x="774" y="463" fill="#64748b" font-size="13" font-weight="800" font-family="Segoe UI, Arial, sans-serif">Score</text>
      <text x="774" y="531" fill="#0f172a" font-size="68" font-weight="800" font-family="Segoe UI, Arial, sans-serif">82</text>
      
    <rect x="880" y="485" width="78" height="30" rx="15" fill="rgba(245,158,11,0.18)" />
    <text x="919" y="505" fill="#0f172a" font-size="12" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Pleno</text>
  
      
    <rect x="970" y="485" width="132" height="30" rx="15" fill="#d1fae5" />
    <text x="1036" y="505" fill="#064e3b" font-size="12" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Posicionamento</text>
  
      <text x="774" y="567" fill="#64748b" font-size="13" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Benchmark</text>
      <text x="774" y="593" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Headline alinhada</text>
<text x="774" y="612" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">ao mercado e boa</text>
<text x="774" y="631" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">densidade de</text>
<text x="774" y="650" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">palavras-chave.</text>
      <text x="966" y="567" fill="#64748b" font-size="13" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Resumo</text>
      <text x="966" y="593" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Boa base de</text>
<text x="966" y="612" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">experiencia, com</text>
<text x="966" y="631" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">espaco para</text>
<text x="966" y="650" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">reforcar resultados</text>
<text x="966" y="669" fill="#0f172a" font-size="13" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">mensuraveis.</text>
    </g>
      <g>
        <rect x="100" y="486" width="500" height="172" rx="26" fill="rgba(255,255,255,0.84)" stroke="rgba(15,23,42,0.08)" />
        <text x="134" y="536" fill="#64748b" font-size="14" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Exemplo de leitura</text>
        <text x="134" y="580" fill="#0f172a" font-size="22" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Perfil com boa base de experiencia, headline</text>
<text x="134" y="610" fill="#0f172a" font-size="22" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">alinhada e espaco claro para reforcar resultados</text>
<text x="134" y="640" fill="#0f172a" font-size="22" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">com numeros.</text>
