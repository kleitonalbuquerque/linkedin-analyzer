
    <svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
      <defs>
        <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#eff6ff" />
          <stop offset="48%" stop-color="#f8fafc" />
          <stop offset="100%" stop-color="#ecfeff" />
        </linearGradient>
        <linearGradient id="buttonPrimary" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#0f766e" />
          <stop offset="100%" stop-color="#0ea5e9" />
        </linearGradient>
        <linearGradient id="analysisBg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(240,249,255,0.95)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0.98)" />
        </linearGradient>
        <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
          <stop offset="100%" stop-color="rgba(14,165,233,0.12)" />
        </linearGradient>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="rgba(15,23,42,0.18)" />
        </filter>
      </defs>
      
      
    <rect width="1280" height="800" fill="url(#pageBg)" />
    <circle cx="1160" cy="128" r="160" fill="rgba(14,165,233,0.12)" />
    <circle cx="179" cy="720" r="210" fill="rgba(15,118,110,0.14)" />
    <circle cx="742" cy="760" r="110" fill="rgba(245,158,11,0.14)" />
    <path d="M 921.5999999999999 64 C 1100.8 128, 1203.1999999999998 224.00000000000003, 1254.4 432" fill="none" stroke="rgba(15,23,42,0.08)" stroke-width="2" stroke-dasharray="10 14" />
  
      <rect x="48" y="52" width="1184" height="696" rx="34" fill="rgba(255,255,255,0.68)" stroke="rgba(255,255,255,0.72)" />
      
    <text x="112" y="140" fill="#0a66c2" font-size="14" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">LinkedIn Analyzer</text>
    <text x="112" y="184" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Analise um perfil aberto</text>
<text x="112" y="238" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">no LinkedIn em segundos.</text>
    <text x="112" y="310" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Capture nome, headline e experiencias</text>
<text x="112" y="340" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">visiveis para gerar um diagnostico com</text>
<text x="112" y="370" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">score de mercado e orientacao pratica.</text>
    
    <rect x="112" y="422" width="148" height="30" rx="15" fill="rgba(255,255,255,0.72)" />
    <text x="186" y="442" fill="#0f172a" font-size="12" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Score de mercado</text>
  

    <rect x="276" y="422" width="148" height="30" rx="15" fill="rgba(255,255,255,0.72)" />
    <text x="350" y="442" fill="#0f172a" font-size="12" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Sugestoes com IA</text>
  

    <rect x="440" y="422" width="148" height="30" rx="15" fill="rgba(255,255,255,0.72)" />
    <text x="514" y="442" fill="#0f172a" font-size="12" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">PDF exportavel</text>
  
  
      
    <g>
      <rect x="726" y="106" width="430" height="572" rx="28" fill="rgba(255,255,255,0.94)" stroke="rgba(15, 23, 42, 0.10)" />
      <rect x="727" y="107" width="428" height="570" rx="27" fill="url(#cardGlow)" opacity="0.65" />
      <text x="752" y="142" fill="#f59e0b" font-size="12" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">LINKEDIN ANALYZER</text>
      <text x="752" y="180" fill="#0f172a" font-size="28" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Diagnostico de perfil com score de</text>
<text x="752" y="214" fill="#0f172a" font-size="28" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">mercado</text>
      <text x="752" y="262" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Capture o perfil aberto no LinkedIn,</text>
<text x="752" y="283" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">gere sugestoes com IA e exporte um PDF</text>
<text x="752" y="304" fill="#334155" font-size="15" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">do resultado.</text>
      <rect x="752" y="343" width="183" height="48" rx="14" fill="url(#buttonPrimary)" />
      <text x="843" y="373" fill="#ffffff" font-size="15" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Analisar perfil</text>
      <rect x="947" y="343" width="183" height="48" rx="14" fill="#f8fafc" stroke="rgba(15, 23, 42, 0.10)" />
      <text x="1038" y="373" fill="#0f172a" font-size="15" font-weight="700" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">Exportar PDF</text>
    </g>
  
      <g opacity="0.78">
        <rect x="752" y="425" width="378" height="118" rx="20" fill="#f8fafc" stroke="rgba(14,165,233,0.12)" stroke-dasharray="8 8" />
        <text x="778" y="474" fill="#334155" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Abra um perfil do LinkedIn para gerar a analise.</text>
        <text x="778" y="507" fill="#64748b" font-size="14" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">A extensao captura nome, headline e experiencias visiveis.</text>
      </g>
      <g>
        <circle cx="152" cy="560" r="8" fill="#0f766e" />
        <text x="174" y="566" fill="#0f172a" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Use o popup em qualquer perfil publico do LinkedIn.</text>
        <circle cx="152" cy="610" r="8" fill="#0ea5e9" />
        <text x="174" y="616" fill="#0f172a" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">A leitura acontece apenas quando voce inicia a analise.</text>
        <circle cx="152" cy="660" r="8" fill="#f59e0b" />
        <text x="174" y="666" fill="#0f172a" font-size="18" font-weight="600" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">O resultado volta em formato objetivo e pronto para revisar.</text>
      </g>
    
    </svg>
  