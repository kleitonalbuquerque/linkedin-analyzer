        <text x="394" y="598" fill="#334155" font-size="16" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">A leitura usa apenas</text>
<text x="394" y="621" fill="#334155" font-size="16" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">informacoes exibidas</text>
<text x="394" y="644" fill="#334155" font-size="16" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">no perfil aberto.</text>
