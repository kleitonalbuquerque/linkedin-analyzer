    <text x="104" y="168" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">Voce controla quando a</text>
<text x="104" y="222" fill="#0f172a" font-size="46" font-weight="800" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">analise comeca.</text>
    <text x="104" y="294" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">A extensao so envia dados visiveis do</text>
<text x="104" y="324" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">perfil depois que voce clica em Analisar</text>
<text x="104" y="354" fill="#334155" font-size="20" font-weight="400" font-family="Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1">perfil.</text>
    
  
      <g>
